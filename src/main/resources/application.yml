spring:
  application:
    name: RAG

  # 配置火山引擎（豆包）的API
  ai:
    openai:
      # 火山引擎网关地址
      # Chat API 使用原生兼容接口
      base-url: https://ark.cn-beijing.volces.com/api/v3
      # 你的火山引擎API Key
      api-key: ${ARK_API_KEY}
      # Embedding配置 - 禁用自动配置，使用自定义实现
      embedding:
        enabled: false
      # Chat模型（豆包的对话模型）
      chat:
        options:
          model: ${CHAT_MODEL:ep-20260419235315-sv4kp}  # 替换为你的推理端点ID

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 2
      timeout: 3000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Milvus 向量数据库配置
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: rag_documents
  dimension: 2048  # 嵌入向量维度

# 自定义配置
volcengine:
  api-key: ${ARK_API_KEY}
  embedding:
    # Embedding端点（多模态模型）
    model: ep-20260420014217-l6bqr
  chat:
    # Chat端点（对话模型）
    model: ep-20260419235315-sv4kp

# 嵌入向量缓存配置
embedding:
  cache:
    enabled: true  # 是否启用缓存
    ttl: 86400  # 缓存过期时间（秒），默认 24 小时


# 服务器端口配置
server:
  port: 8081
