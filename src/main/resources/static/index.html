<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .document-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
        }

        .document-item {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .document-item:hover {
            background: #f8f9ff;
            border-color: #667eea;
        }

        .document-item.selected {
            background: #e8eaf6;
            border-color: #667eea;
            border-width: 2px;
        }

        .document-info {
            flex: 1;
        }

        .document-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }

        .document-id {
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }

        .document-stats {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .stat-badge {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            color: #666;
        }

        .document-actions {
            display: flex;
            gap: 5px;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        .document-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .document-selector select {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }

        .document-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-messages {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message .label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .message .context-info {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
            font-style: italic;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: #f8f9ff;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
        }

        .global-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 RAG 知识库问答系统</h1>
            <p>基于火山引擎多模态嵌入的智能问答系统</p>
            <p style="font-size: 0.9em; margin-top: 10px;">服务运行在端口: 8081 | 支持文档隔离管理</p>
        </div>

        <div class="main-layout">
            <!-- 左侧边栏 -->
            <div class="sidebar">
                <!-- 文档上传 -->
                <div class="card">
                    <h2>📄 文档上传</h2>
                    <div class="upload-area" id="uploadArea">
                        <p>拖拽文件到此处或点击选择</p>
                        <p style="font-size: 0.9em; color: #999;">支持 PDF、TXT、DOCX 等</p>
                        <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.doc">
                    </div>
                    <div class="status" id="uploadStatus"></div>
                </div>

                <!-- 文档列表 -->
                <div class="card">
                    <h2>📋 文档管理</h2>
                    <div class="global-actions">
                        <button class="btn btn-small btn-success" onclick="refreshDocuments()">刷新</button>
                        <button class="btn btn-small btn-danger" onclick="clearAllDocuments()">清空全部</button>
                    </div>
                    <div class="document-list" id="documentList">
                        <div class="empty-state">暂无文档，请上传文档</div>
                    </div>
                </div>

                <!-- 统计信息 -->
                <div class="card">
                    <h2>📊 统计信息</h2>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="value" id="totalDocuments">0</div>
                            <div class="label">文档总数</div>
                        </div>
                        <div class="stat-item">
                            <div class="value" id="totalChunks">0</div>
                            <div class="label">文档块总数</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧聊天区域 -->
            <div class="card">
                <h2>💬 智能问答</h2>
                <div class="chat-container">
                    <div class="document-selector">
                        <label for="documentSelect">选择文档范围:</label>
                        <select id="documentSelect">
                            <option value="">所有文档</option>
                        </select>
                        <button class="btn btn-small" onclick="refreshDocumentSelect()">刷新列表</button>
                    </div>
                    
                    <div class="chat-messages" id="chatMessages">
                        <div class="empty-state">请选择文档范围后开始问答</div>
                    </div>
                    
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="请输入您的问题...">
                        <button class="btn" id="sendBtn" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let documents = [];
        let filenameMap = {};
        let selectedDocumentId = '';

        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        const sendBtn = document.getElementById('sendBtn');
        const documentList = document.getElementById('documentList');
        const documentSelect = document.getElementById('documentSelect');
        const totalDocumentsEl = document.getElementById('totalDocuments');
        const totalChunksEl = document.getElementById('totalChunks');

        // 初始化
        window.onload = () => {
            refreshDocuments();
            setupEventListeners();
        };

        // 设置事件监听器
        function setupEventListeners() {
            // 文件上传相关
            uploadArea.addEventListener('click', () => fileInput.click());
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    uploadFile(files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    uploadFile(e.target.files[0]);
                }
            });

            // 聊天相关
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // 文档选择相关
            documentSelect.addEventListener('change', (e) => {
                selectedDocumentId = e.target.value;
                updateChatPlaceholder();
            });
        }

        // 文件上传
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            showUploadStatus('正在上传和处理文档...', 'loading');

            try {
                const response = await fetch('/api/rag/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showUploadStatus(`✓ ${result.message} - 共生成 ${result.chunks} 个文档块`, 'success');
                    // 刷新文档列表和统计
                    await refreshDocuments();
                    // 自动选择新上传的文档
                    if (result.documentId) {
                        selectedDocumentId = result.documentId;
                        documentSelect.value = result.documentId;
                        updateChatPlaceholder();
                    }
                } else {
                    showUploadStatus(`✗ ${result.message}`, 'error');
                }
            } catch (error) {
                showUploadStatus(`✗ 上传失败: ${error.message}`, 'error');
            }
        }

        function showUploadStatus(message, type) {
            uploadStatus.className = 'status';
            if (type === 'loading') {
                uploadStatus.innerHTML = `<span class="loading"></span> ${message}`;
            } else {
                uploadStatus.textContent = message;
                uploadStatus.className += ` ${type}`;
            }
            uploadStatus.style.display = 'block';
        }

        // 文档管理
        async function refreshDocuments() {
            try {
                const response = await fetch('/api/rag/documents');
                const result = await response.json();
                
                if (result.success) {
                    documents = result.documents || [];
                    filenameMap = result.filenameMap || {};
                    updateDocumentList();
                    updateDocumentSelect();
                    updateStats();
                } else {
                    console.error('获取文档列表失败:', result.message);
                }
            } catch (error) {
                console.error('获取文档列表失败:', error);
            }
        }

        function updateDocumentList() {
            if (documents.length === 0) {
                documentList.innerHTML = '<div class="empty-state">暂无文档，请上传文档</div>';
                return;
            }

            documentList.innerHTML = documents.map(docId => {
                const filename = filenameMap[docId] || `文档 ${docId.substring(0, 8)}...`;
                return `
                <div class="document-item" data-id="${docId}">
                    <div class="document-info">
                        <div class="document-name">${filename}</div>
                        <div class="document-id">${docId}</div>
                        <div class="document-stats">
                            <span class="stat-badge" id="chunks-${docId}">加载中...</span>
                        </div>
                    </div>
                    <div class="document-actions">
                        <button class="btn btn-small btn-danger" onclick="deleteDocument('${docId}')">删除</button>
                    </div>
                </div>
            `;
            }).join('');

            // 加载每个文档的统计信息
            documents.forEach(docId => {
                loadDocumentStats(docId);
            });
        }

        async function loadDocumentStats(documentId) {
            try {
                const response = await fetch(`/api/rag/document/${documentId}/status`);
                const result = await response.json();
                
                if (result.success) {
                    const chunksEl = document.getElementById(`chunks-${documentId}`);
                    if (chunksEl) {
                        chunksEl.textContent = `${result.chunks} 块`;
                    }
                }
            } catch (error) {
                console.error(`获取文档 ${documentId} 统计失败:`, error);
            }
        }

        function updateDocumentSelect() {
            const currentValue = documentSelect.value;
            documentSelect.innerHTML = '<option value="">所有文档</option>' +
                documents.map(docId => {
                    const filename = filenameMap[docId] || `文档 ${docId.substring(0, 8)}...`;
                    return `<option value="${docId}">${filename}</option>`;
                }).join('');
            documentSelect.value = currentValue;
        }

        function updateStats() {
            totalDocumentsEl.textContent = documents.length;
            
            // 获取总文档块数
            fetch('/api/rag/status')
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        totalChunksEl.textContent = result.totalChunks || 0;
                    }
                })
                .catch(error => console.error('获取统计信息失败:', error));
        }

        async function deleteDocument(documentId) {
            if (!confirm(`确定要删除文档 ${documentId.substring(0, 8)}... 吗？`)) return;

            try {
                const response = await fetch(`/api/rag/document/${documentId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('文档删除成功');
                    await refreshDocuments();
                    // 如果删除的是当前选中的文档，清空选择
                    if (selectedDocumentId === documentId) {
                        selectedDocumentId = '';
                        documentSelect.value = '';
                        updateChatPlaceholder();
                    }
                } else {
                    alert(`删除失败: ${result.message}`);
                }
            } catch (error) {
                alert(`删除失败: ${error.message}`);
            }
        }

        async function clearAllDocuments() {
            if (!confirm('确定要清空所有文档吗？此操作不可恢复！')) return;

            try {
                const response = await fetch('/api/rag/clear', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    alert('所有文档已清空');
                    await refreshDocuments();
                    selectedDocumentId = '';
                    documentSelect.value = '';
                    updateChatPlaceholder();
                    chatMessages.innerHTML = '<div class="empty-state">请选择文档范围后开始问答</div>';
                } else {
                    alert(`清空失败: ${result.message}`);
                }
            } catch (error) {
                alert(`清空失败: ${error.message}`);
            }
        }

        function refreshDocumentSelect() {
            updateDocumentSelect();
        }

        function updateChatPlaceholder() {
            if (selectedDocumentId) {
                chatInput.placeholder = `在文档 ${selectedDocumentId.substring(0, 8)}... 中搜索问题...`;
            } else {
                chatInput.placeholder = '在所有文档中搜索问题...';
            }
        }

        // 聊天功能
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // 清空初始状态提示
            if (chatMessages.querySelector('.empty-state')) {
                chatMessages.innerHTML = '';
            }

            const userContextInfo = selectedDocumentId 
                ? `（针对文档 ${filenameMap[selectedDocumentId] || selectedDocumentId.substring(0, 8)}...）`
                : '（针对所有文档）';
            addMessage('user', message, userContextInfo);
            chatInput.value = '';
            sendBtn.disabled = true;

            try {
                const url = selectedDocumentId 
                    ? `/api/rag/chat?message=${encodeURIComponent(message)}&documentId=${selectedDocumentId}`
                    : `/api/rag/chat?message=${encodeURIComponent(message)}`;
                
                const response = await fetch(url);
                const result = await response.json();

                if (result.success) {
                    const contextInfo = selectedDocumentId 
                        ? `（基于文档 ${filenameMap[selectedDocumentId] || selectedDocumentId.substring(0, 8)}... 的回答）`
                        : '（基于所有文档的回答）';
                    addMessage('assistant', result.response, contextInfo);
                } else {
                    addMessage('assistant', `错误: ${result.message}`);
                }
            } catch (error) {
                addMessage('assistant', `请求失败: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, content, contextInfo = '') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="label">${role === 'user' ? '用户' : '助手'}</div>
                <div class="content">${content}</div>
                ${contextInfo ? `<div class="context-info">${contextInfo}</div>` : ''}
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
